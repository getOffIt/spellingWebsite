<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Leo Bedtime Stories</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --card: rgba(15, 23, 42, 0.82);
      --text: #e5eefb;
      --muted: #a9b8d0;
      --accent: #60a5fa;
      --accent2: #22c55e;
      --border: rgba(148, 163, 184, 0.25);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1e293b 0%, var(--bg) 55%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
    }
    h1 { margin: 0 0 8px; font-size: 2rem; }
    p { margin: 0 0 16px; color: var(--muted); line-height: 1.45; }
    .actions {
      display: grid;
      gap: 12px;
      margin: 20px 0 24px;
    }
    button, a.link {
      appearance: none;
      border: 0;
      border-radius: 16px;
      padding: 16px 18px;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      text-align: center;
    }
    .primary {
      background: linear-gradient(135deg, var(--accent), #2563eb);
      color: white;
    }
    .secondary {
      background: linear-gradient(135deg, var(--accent2), #15803d);
      color: white;
    }
    .disabled {
      opacity: 0.45;
      pointer-events: none;
    }
    audio {
      width: 100%;
      margin: 14px 0 20px;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 10px;
    }
    li {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .story-title { font-weight: 700; }
    .story-sub { color: var(--muted); font-size: 0.95rem; }
    .tiny { font-size: 0.9rem; color: var(--muted); margin-top: 20px; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Leo bedtime stories</h1>
    <p>One button for tonight’s full batch. Best on the same Wi‑Fi as the Mac mini.</p>

    <div class="actions">
      <button class="primary" id="playAll">▶ Play all 3 stories</button>
      <a class="link secondary" id="downloadAll" href="../audio/bedtime-batch-current.mp3" download>⬇ Download the combined MP3</a>
    </div>

    <audio id="player" controls preload="metadata" playsinline>
      <source src="../audio/bedtime-batch-current.mp3" type="audio/mpeg">
    </audio>

    <ul id="storiesList"></ul>

    <p class="tiny">If iPhone opens the audio in a new tab, that’s fine. The big button uses the combined file so you don’t need to manage the playlist manually.</p>
  </main>

  <script>
    const button = document.getElementById('playAll');
    const player = document.getElementById('player');
    const downloadLink = document.getElementById('downloadAll');
    const storiesList = document.getElementById('storiesList');
    const combinedPath = '../audio/bedtime-batch-current.mp3';

    button.addEventListener('click', async () => {
      player.currentTime = 0;
      try {
        await player.play();
      } catch (err) {
        console.error(err);
      }
    });

    async function loadStories() {
      try {
        const response = await fetch('../bedtime-tracker.json', { cache: 'no-store' });
        const tracker = await response.json();
        const queue = Array.isArray(tracker.queue) ? tracker.queue : [];
        const stories = queue.length > 0
          ? queue
          : (Array.isArray(tracker.lastPublished) ? tracker.lastPublished : []);

        storiesList.innerHTML = '';
        stories.forEach((item) => {
          const li = document.createElement('li');
          const audioPath = item.audioFile ? `../${item.audioFile}` : '#';
          li.innerHTML = `
            <div>
              <div class="story-title">${formatSeries(item.series)} ${item.book}</div>
              <div class="story-sub">${item.title}</div>
            </div>
            <a class="link primary ${item.audioFile ? '' : 'disabled'}" href="${audioPath}">Play</a>
          `;
          storiesList.appendChild(li);
        });

        const ready = stories.length > 0 && stories.every((item) => item.audioFile);
        if (!ready) {
          button.classList.add('disabled');
          downloadLink.classList.add('disabled');
        } else {
          button.classList.remove('disabled');
          downloadLink.classList.remove('disabled');
          player.querySelector('source').src = combinedPath;
          player.load();
        }
      } catch (err) {
        console.error(err);
      }
    }

    function formatSeries(series) {
      if (series === 'diamond-sword') return 'Diamond Sword';
      if (series === 'one-block') return 'One Block';
      if (series === 'hogwarts') return 'Hogwarts';
      return series;
    }

    loadStories();
  </script>
</body>
</html>
